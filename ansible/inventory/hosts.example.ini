[windows]
win-gha-example ansible_host=192.0.2.10

[windows:vars]
ansible_connection=winrm
ansible_port=5985
ansible_winrm_transport=basic
ansible_winrm_server_cert_validation=ignore

[linux]
linux-gha-example ansible_host=192.0.2.20

[linux:vars]
ansible_connection=ssh
ansible_user=ansible
ansible_become=true

# See fleet.example.ini for the default 3-node runner layout: gha-linux01..03 and gha-win01..03.
