# Example fleet inventory with documentation-only addresses.
# Copy to fleet.ini or hosts.ini and replace with real hostnames/IPs.

[orchestrators]
gha-orch01 ansible_host=192.0.2.91 proxmox_node=pve01 managed_runners="gha-linux01,gha-win01"
gha-orch02 ansible_host=192.0.2.92 proxmox_node=pve02 managed_runners="gha-linux02,gha-win02"
gha-orch03 ansible_host=192.0.2.93 proxmox_node=pve03 managed_runners="gha-linux03,gha-win03"

[linux]
gha-linux01 ansible_host=192.0.2.101 runner_node=pve01 runner_labels="self-hosted,linux,x64,dotnet10,proxmox,pve01,ephemeral"
gha-linux02 ansible_host=192.0.2.102 runner_node=pve02 runner_labels="self-hosted,linux,x64,dotnet10,proxmox,pve02,ephemeral"
gha-linux03 ansible_host=192.0.2.103 runner_node=pve03 runner_labels="self-hosted,linux,x64,dotnet10,proxmox,pve03,ephemeral"

[windows]
gha-win01 ansible_host=192.0.2.111 runner_node=pve01 runner_labels="self-hosted,windows,x64,dotnet10,proxmox,pve01,ephemeral"
gha-win02 ansible_host=192.0.2.112 runner_node=pve02 runner_labels="self-hosted,windows,x64,dotnet10,proxmox,pve02,ephemeral"
gha-win03 ansible_host=192.0.2.113 runner_node=pve03 runner_labels="self-hosted,windows,x64,dotnet10,proxmox,pve03,ephemeral"

# Optional NAS/high-capacity runner group. Enable by copying to a real inventory and assigning real addresses.
[nas_orchestrators]
gha-nas-orch01 ansible_host=192.0.2.191 runner_group=nas-beefy managed_runners="gha-nas-linux01,gha-nas-win01"

[nas_linux]
gha-nas-linux01 ansible_host=192.0.2.201 runner_labels="self-hosted,linux,x64,dotnet10,nas,beefy,ephemeral"

[nas_windows]
gha-nas-win01 ansible_host=192.0.2.211 runner_labels="self-hosted,windows,x64,dotnet10,nas,beefy,vs-buildtools,ephemeral"
