---
# Shared example defaults. Copy to all.yml and customize locally.

# Pin runner version intentionally instead of always pulling latest.
actions_runner_version: "2.335.1"

# Default labels are intentionally project-neutral so the same organization-level
# runners can serve multiple repositories.
runner_labels: "self-hosted,proxmox,dotnet10,ephemeral"

# Local orchestrator pattern: one tiny orchestrator per Proxmox node, each
# managing only its local Linux/Windows runner pair.
local_orchestrator_enabled: true
