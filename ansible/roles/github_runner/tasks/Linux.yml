---
- name: Create runner user
  ansible.builtin.user:
    name: "{{ runner_user }}"
    shell: /bin/bash
    create_home: true

- name: Create runner directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ runner_user }}"
    group: "{{ runner_user }}"
    mode: '0755'
  loop:
    - "{{ actions_runner_dir }}"
    - "{{ actions_work_dir }}"

- name: Request GitHub runner registration token
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/actions/runners/registration-token"
    method: POST
    headers:
      Authorization: "Bearer {{ github_pat }}"
      Accept: "application/vnd.github+json"
      X-GitHub-Api-Version: "2022-11-28"
    return_content: true
  register: runner_token_response
  no_log: true

- name: Extract registration token
  ansible.builtin.set_fact:
    runner_token: "{{ runner_token_response.json.token }}"
  no_log: true

- name: Download GitHub Actions runner package
  ansible.builtin.get_url:
    url: "https://github.com/actions/runner/releases/download/v{{ actions_runner_version }}/actions-runner-linux-x64-{{ actions_runner_version }}.tar.gz"
    dest: "/tmp/actions-runner-linux-x64-{{ actions_runner_version }}.tar.gz"
    mode: '0644'

- name: Extract runner package
  ansible.builtin.unarchive:
    src: "/tmp/actions-runner-linux-x64-{{ actions_runner_version }}.tar.gz"
    dest: "{{ actions_runner_dir }}"
    remote_src: true
    owner: "{{ runner_user }}"
    group: "{{ runner_user }}"
    creates: "{{ actions_runner_dir }}/config.sh"

- name: Configure runner
  ansible.builtin.command: >
    ./config.sh
    --unattended
    --url {{ github_repo_url }}
    --token {{ runner_token }}
    --name {{ runner_name }}
    --labels {{ runner_labels }}
    --work {{ actions_work_dir }}
    {{ '--ephemeral' if runner_ephemeral else '' }}
    --replace
  args:
    chdir: "{{ actions_runner_dir }}"
    creates: "{{ actions_runner_dir }}/.runner"
  become_user: "{{ runner_user }}"
  no_log: true

- name: Install runner service
  ansible.builtin.command: ./svc.sh install {{ runner_user }}
  args:
    chdir: "{{ actions_runner_dir }}"
    creates: /etc/systemd/system/actions.runner.*.service
  when: not runner_ephemeral

- name: Start runner service
  ansible.builtin.command: ./svc.sh start
  args:
    chdir: "{{ actions_runner_dir }}"
  changed_when: false
  when: not runner_ephemeral
