---
# Run this only on cloned VMs, not on the golden template.
- name: Register Windows GitHub Actions runner
  hosts: windows
  gather_facts: false

  # github_owner / github_repo / registration_scope come from group_vars
  # (inventory/group_vars/all.yml) — do NOT set them here: play vars override group_vars.
  vars:
    runner_labels: "{{ hostvars[inventory_hostname].runner_labels | default('self-hosted,windows,x64,dotnet10,proxmox') }}"

  roles:
    - github_runner
