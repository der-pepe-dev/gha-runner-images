---
- name: Configure Linux GitHub Actions base image
  hosts: linux
  become: true
  gather_facts: true

  # pre_tasks run before roles, so base packages (curl, used by dotnet-install) are
  # present before the dotnet_sdk role runs.
  pre_tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - git
          - curl
          - unzip
          - ca-certificates
        state: present
        update_cache: true
      when: ansible_os_family == 'Debian'

  roles:
    - dotnet_sdk
