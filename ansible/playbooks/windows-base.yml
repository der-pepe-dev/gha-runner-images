---
- name: Configure Windows GitHub Actions base image
  hosts: windows
  gather_facts: false

  vars:
    dotnet_install_dir: 'C:\Program Files\dotnet'
    git_for_windows_url: "https://github.com/git-for-windows/git/releases/download/v2.51.0.windows.1/Git-2.51.0-64-bit.exe"
    powershell_7_url: "https://github.com/PowerShell/PowerShell/releases/download/v7.5.3/PowerShell-7.5.3-win-x64.msi"

  tasks:
    - name: Create tools and runner directories
      ansible.windows.win_file:
        path: "{{ item }}"
        state: directory
      loop:
        - C:\tools
        - "{{ actions_runner_dir }}"
        - "{{ actions_work_dir }}"

    - name: Enable long paths
      ansible.windows.win_regedit:
        path: HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem
        name: LongPathsEnabled
        data: 1
        type: dword

    - name: Disable hibernation
      ansible.windows.win_shell: powercfg /hibernate off
      changed_when: false

    - name: Install Git for Windows
      ansible.windows.win_package:
        path: "{{ git_for_windows_url }}"
        arguments:
          - /VERYSILENT
          - /NORESTART
        creates_path: C:\Program Files\Git\bin\git.exe

    - name: Install PowerShell 7
      ansible.windows.win_package:
        path: "{{ powershell_7_url }}"
        arguments: /quiet /norestart
        creates_path: C:\Program Files\PowerShell\7\pwsh.exe

    - name: Download dotnet-install script
      ansible.windows.win_get_url:
        url: https://dot.net/v1/dotnet-install.ps1
        dest: C:\tools\dotnet-install.ps1

    - name: Install .NET SDK system-wide
      ansible.windows.win_shell: >
        powershell -ExecutionPolicy Bypass
        -File C:\tools\dotnet-install.ps1
        -Channel {{ dotnet_channel }}
        -InstallDir "{{ dotnet_install_dir }}"
      args:
        creates: 'C:\Program Files\dotnet\dotnet.exe'

    - name: Add dotnet to machine PATH
      ansible.windows.win_path:
        elements:
          - 'C:\Program Files\dotnet'
        scope: machine
        state: present

    - name: Show dotnet info
      ansible.windows.win_shell: '& "C:\Program Files\dotnet\dotnet.exe" --info'
      changed_when: false
