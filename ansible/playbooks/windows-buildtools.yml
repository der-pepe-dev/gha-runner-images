---
- name: Install Visual Studio Build Tools on Windows runner
  hosts: windows
  gather_facts: false

  vars:
    vs_buildtools_path: C:\tools\vs_BuildTools.exe
    # Verify and pin this URL before real use.
    vs_buildtools_url: "https://aka.ms/vs/18/release/vs_BuildTools.exe"

  tasks:
    - name: Ensure tools directory exists
      ansible.windows.win_file:
        path: C:\tools
        state: directory

    - name: Download Visual Studio Build Tools bootstrapper if missing
      ansible.windows.win_get_url:
        url: "{{ vs_buildtools_url }}"
        dest: "{{ vs_buildtools_path }}"
      when: vs_buildtools_url is defined

    - name: Install minimal MSBuild and managed desktop build tools
      ansible.windows.win_shell: >
        {{ vs_buildtools_path }}
        --quiet
        --wait
        --norestart
        --nocache
        --installPath C:\BuildTools
        --add Microsoft.VisualStudio.Workload.MSBuildTools
        --add Microsoft.VisualStudio.Workload.ManagedDesktopBuildTools
      args:
        creates: C:\BuildTools\Common7\Tools\VsDevCmd.bat
