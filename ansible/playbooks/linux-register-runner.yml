---
# Run this only on cloned VMs, not on the golden template.
- name: Register Linux GitHub Actions runner
  hosts: linux
  become: true
  gather_facts: true

  vars:
    github_owner: "CHANGE_ME_OWNER"
    github_repo: "CHANGE_ME_REPO"
    runner_labels: "{{ hostvars[inventory_hostname].runner_labels | default('self-hosted,linux,x64,dotnet10,proxmox') }}"

  roles:
    - github_runner
