---
# Run this only on cloned VMs, not on the golden template.
- name: Register Linux GitHub Actions runner
  hosts: linux
  become: true
  gather_facts: true

  vars:
    github_owner: "CHANGE_ME_OWNER"
    github_repo: "CHANGE_ME_REPO"
    github_repo_url: "https://github.com/{{ github_owner }}/{{ github_repo }}"
    runner_name: "{{ inventory_hostname }}"
    runner_labels: "{{ hostvars[inventory_hostname].runner_labels | default('self-hosted,linux,x64,dotnet10,proxmox') }}"
    runner_archive: "/tmp/actions-runner-linux-x64-{{ actions_runner_version }}.tar.gz"

  tasks:
    - name: Create runner user
      ansible.builtin.user:
        name: gha-runner
        shell: /bin/bash
        create_home: true

    - name: Create runner directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: gha-runner
        group: gha-runner
        mode: '0755'
      loop:
        - "{{ actions_runner_dir }}"
        - "{{ actions_work_dir }}"

    - name: Request GitHub runner registration token
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_owner }}/{{ github_repo }}/actions/runners/registration-token"
        method: POST
        headers:
          Authorization: "Bearer {{ github_pat }}"
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        return_content: true
      register: runner_token_response
      no_log: true

    - name: Extract registration token
      ansible.builtin.set_fact:
        runner_token: "{{ runner_token_response.json.token }}"
      no_log: true

    - name: Download GitHub Actions runner package
      ansible.builtin.get_url:
        url: "https://github.com/actions/runner/releases/download/v{{ actions_runner_version }}/actions-runner-linux-x64-{{ actions_runner_version }}.tar.gz"
        dest: "{{ runner_archive }}"
        mode: '0644'

    - name: Extract runner package
      ansible.builtin.unarchive:
        src: "{{ runner_archive }}"
        dest: "{{ actions_runner_dir }}"
        remote_src: true
        owner: gha-runner
        group: gha-runner
        creates: "{{ actions_runner_dir }}/config.sh"

    - name: Configure runner
      ansible.builtin.command: >
        ./config.sh
        --unattended
        --url {{ github_repo_url }}
        --token {{ runner_token }}
        --name {{ runner_name }}
        --labels {{ runner_labels }}
        --work {{ actions_work_dir }}
        --replace
      args:
        chdir: "{{ actions_runner_dir }}"
      become_user: gha-runner
      no_log: true

    - name: Install runner service
      ansible.builtin.command: ./svc.sh install gha-runner
      args:
        chdir: "{{ actions_runner_dir }}"
        creates: /etc/systemd/system/actions.runner.*.service

    - name: Start runner service
      ansible.builtin.command: ./svc.sh start
      args:
        chdir: "{{ actions_runner_dir }}"
