# Example local fleet definition for scripts/clone-runner-fleet.ps1.
# Copy to fleet.local.yml and replace placeholders. Do not commit real values.

proxmox_url: "https://pve.example.local:8006/api2/json"
windows_template_vmid: 9001
linux_template_vmid: 9002
orchestrator_template_vmid: 9003
storage: "local-lvm"
full_clone: true

orchestrators:
  - name: gha-orch01
    node: pve01
    vmid: 291
    manages:
      - gha-linux01
      - gha-win01
  - name: gha-orch02
    node: pve02
    vmid: 292
    manages:
      - gha-linux02
      - gha-win02
  - name: gha-orch03
    node: pve03
    vmid: 293
    manages:
      - gha-linux03
      - gha-win03

runners:
  - name: gha-linux01
    node: pve01
    vmid: 301
    template: linux
    labels: "self-hosted,linux,x64,dotnet10,proxmox,pve01,ephemeral"
  - name: gha-win01
    node: pve01
    vmid: 311
    template: windows
    labels: "self-hosted,windows,x64,dotnet10,proxmox,pve01,ephemeral"
  - name: gha-linux02
    node: pve02
    vmid: 302
    template: linux
    labels: "self-hosted,linux,x64,dotnet10,proxmox,pve02,ephemeral"
  - name: gha-win02
    node: pve02
    vmid: 312
    template: windows
    labels: "self-hosted,windows,x64,dotnet10,proxmox,pve02,ephemeral"
  - name: gha-linux03
    node: pve03
    vmid: 303
    template: linux
    labels: "self-hosted,linux,x64,dotnet10,proxmox,pve03,ephemeral"
  - name: gha-win03
    node: pve03
    vmid: 313
    template: windows
    labels: "self-hosted,windows,x64,dotnet10,proxmox,pve03,ephemeral"

# Optional high-capacity NAS/server runner group is managed separately, not by this
# script — clone-runner-fleet.ps1 only reads `orchestrators` and `runners` above and
# maps the `windows`/`linux` templates. To add NAS runners, give them their own
# fleet file / orchestrator. See docs/nas-runner-group.md.
